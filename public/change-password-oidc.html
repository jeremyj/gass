<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GASS Torpignattara - Imposta Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🌱 GASS Torpignattara</h1>
            <p>Imposta la tua nuova password</p>
        </div>

        <div class="login-form">
            <div id="error-message" class="login-error-message"></div>

            <form id="change-password-form">
                <div class="form-group">
                    <label for="newPassword">Nuova password</label>
                    <input type="password" id="newPassword" name="newPassword" required autofocus minlength="8">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Conferma password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8">
                </div>

                <button type="submit" class="login-btn" id="submit-btn">Salva password</button>
            </form>
        </div>
    </div>

    <script src="js/change-password-oidc.js"></script>
</body>
</html>
