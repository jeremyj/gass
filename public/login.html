<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GASS Torpignattara - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🌱 GASS Torpignattara</h1>
        </div>

        <div class="login-form">
            <div id="error-message" class="login-error-message"></div>

            <!-- Authentik SSO button (shown only when OIDC is enabled) -->
            <div id="oidc-section" style="display:none; margin-bottom: 1.5rem;">
                <a href="/auth/oidc/login" class="login-btn" id="oidc-btn" style="display:block; text-align:center; text-decoration:none;">
                    Accedi
                </a>
                <div style="text-align:center; margin-top: 1rem; color: #888; font-size: 0.85em;">
                    <a href="#" id="show-local-login" style="color: #aaa;">Accesso admin locale</a>
                </div>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autofocus>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="login-btn" id="login-btn">Accedi</button>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
